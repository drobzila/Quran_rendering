name: Quran Batch Shorts Generator (Google Drive)

on:
  workflow_dispatch:
    inputs:
      count:
        description: "عدد الفيديوهات المطلوب إنشاؤها"
        required: false
        default: "50"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            libglib2.0-dev \
            pkg-config \
            python3-dev \
            fonts-dejavu-core

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install manim mutagen pydub requests numpy google-api-python-client google-auth google-auth-oauthlib

      - name: Register local font
        run: |
          mkdir -p ~/.fonts
          cp Amiri-Regular.ttf ~/.fonts/
          fc-cache -fv

      # ------------------- RESTORE OAUTH -------------------

      - name: Restore Google OAuth files
        run: |
          cat <<'EOF' > credentials.json
          ${{ secrets.GOOGLE_CREDENTIALS }}
          EOF

          cat <<'EOF' > token.json
          ${{ secrets.GOOGLE_TOKEN }}
          EOF

      - name: Verify Google Drive OAuth
        run: |
          python - <<'PY'
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          SCOPES = ["https://www.googleapis.com/auth/drive.file"]

          creds = Credentials.from_authorized_user_file(
              "token.json",
              SCOPES
          )

          if creds.expired and creds.refresh_token:
              creds.refresh(Request())

          service = build("drive", "v3", credentials=creds)

          about = service.about().get(fields="user").execute()

          print("✅ OAuth يعمل")
          print("الحساب:", about["user"]["emailAddress"])
          PY

      # ------------------- GENERATE VIDEOS -------------------

      - name: Generate batch videos
        env:
          BATCH_COUNT: ${{ github.event.inputs.count }}
          OUTPUT_DIR: batch_output
        run: python generate_batch.py

      # ------------------- UPLOAD TO DRIVE -------------------

      - name: Upload videos to Google Drive
        run: |
          python upload_drive.py \
            --folder batch_output \
            --drive-folder-id "${{ secrets.GDRIVE_FOLDER_ID }}" \
            --credentials credentials.json \
            --token token.json

      # ------------------- SAVE ARTIFACT -------------------

      - name: Upload batch as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quran-batch
          path: batch_output/
          retention-days: 1

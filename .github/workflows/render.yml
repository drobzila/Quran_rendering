name: Render Quran Video

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 تحميل المشروع
        uses: actions/checkout@v4

      - name: 🐍 تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 تثبيت النظام
        run: |
          sudo apt update
          sudo apt install -y ffmpeg fonts-dejavu-core
          
      - name: 🔤 تحميل خط Amiri
        run: |
          mkdir -p ~/.fonts
          wget https://github.com/aliftype/amiri/releases/download/0.113/amiri-regular.ttf -O ~/.fonts/Amiri.ttf
          fc-cache -fv

      - name: 📚 تثبيت المكتبات
        run: |
          pip install manim pydub mutagen requests numpy

      - name: 🎬 تشغيل السكريبت
        run: |
          python your_script.py

      - name: 📤 رفع الفيديو
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: |
            Quran_Normal.mp4
            Quran_Shorts.mp4

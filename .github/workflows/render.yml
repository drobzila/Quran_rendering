name: Quran Shorts Generator
on:
  schedule:
    - cron: "0 8,15 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          ffmpeg \
          libcairo2-dev \
          libpango1.0-dev \
          libglib2.0-dev \
          pkg-config \
          python3-dev \
          fonts-dejavu-core

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install manim mutagen pydub requests numpy google-api-python-client google-auth google-auth-oauthlib

    - name: Register local font
      run: |
        mkdir -p ~/.fonts
        cp Amiri-Regular.ttf ~/.fonts/
        fc-cache -fv

    # ------------------- 🔐 RESTORE GOOGLE AUTH FILES -------------------
    - name: Restore client_secret.json
      run: echo '${{ secrets.CLIENT_SECRET }}' > client_secret.json

    - name: Restore token.pkl
      run: echo "${{ secrets.YT_TOKEN }}" | base64 -d > token.pkl

    # ------------------- 🎬 RUN GENERATION -------------------
    - name: Run script
      run: python Quran.py

    # ------------------- 🔄 RENAME OUTPUT FILE -------------------
    - name: Rename output file
      run: mv Quran_Neon_Shorts.mp4 Quran_Shorts.mp4

    # ------------------- 📤 UPLOAD TO YOUTUBE -------------------
    - name: Upload to YouTube
      run: python upload.py

    # ------------------- 📦 ARTIFACT -------------------
    - name: Upload video artifact
      uses: actions/upload-artifact@v4
      with:
        name: quran-short-${{ github.run_number }}
        path: Quran_Shorts.mp4
        retention-days: 1
        if-no-files-found: warn

    # ------------------- 💾 SAVE USED AYAH -------------------
    - name: Commit used ayahs
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add used_ayahs.json
        git commit -m "update used ayahs" || echo "no changes"
        git push

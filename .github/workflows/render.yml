name: Generate Quran Shorts

on:
  schedule:
    - cron: "0 */6 * * *"  # كل 6 ساعات
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install manim mutagen pydub requests numpy
        sudo apt update
        sudo apt install ffmpeg -y

    - name: Install Arabic font
      run: |
        mkdir -p ~/.fonts
        wget https://github.com/aliftype/amiri/releases/download/0.113/amiri-regular.ttf -O ~/.fonts/Amiri.ttf
        fc-cache -fv

    - name: Run script
      run: python your_script.py

    - name: Commit used ayahs
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@example.com"
        git add used_ayahs.json
        git commit -m "update used ayahs" || echo "no changes"
        git push
